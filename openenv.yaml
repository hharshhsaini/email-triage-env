name: email-triage-env
version: "1.0.0"
description: >
  An OpenEnv environment for training and evaluating AI agents on 
  enterprise email triage. Agents manage a realistic inbox: prioritizing, 
  categorizing, drafting replies, escalating, and archiving. Models a 
  real-world knowledge worker task with immediate value for productivity 
  agent development.

author: "Antigravity"
license: MIT

environment:
  entry_point: app.py
  api_base: http://localhost:7860
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state

tasks:
  - id: priority_triage
    name: "Priority Triage"
    difficulty: easy
    description: "Set correct priority on 10 emails (urgent/high/normal/low/spam). Uses SET_PRIORITY actions. Score = weighted priority accuracy."
    max_steps: 15
    inbox_size: 10
    success_threshold: 0.7
    grader: "env.graders:grade_priority_triage"

  - id: smart_categorization
    name: "Smart Categorization"
    difficulty: medium
    description: "Categorize AND prioritize 15 emails using CATEGORIZE and SET_PRIORITY. Score rewards both correct category (60%) and correct priority (40%)."
    max_steps: 35
    inbox_size: 15
    success_threshold: 0.6
    grader: "env.graders:grade_smart_categorization"

  - id: executive_assistant
    name: "Executive Assistant"
    difficulty: hard
    description: "Full EA workflow on 20 emails: prioritize top emails, draft quality replies, escalate legal/compliance issues, archive noise. Score = prioritization_f1 (30%) + reply_quality (40%) + escalation_accuracy (20%) + inbox_hygiene (10%)."
    max_steps: 50
    inbox_size: 20
    success_threshold: 0.45
    grader: "env.graders:grade_executive_assistant"

observation_space:
  type: structured
  fields:
    - name: current_email
      type: object
      description: "Email requiring attention"
    - name: inbox_summary
      type: dict
      description: "Counts by priority/category"
    - name: step_number
      type: int
    - name: emails_remaining
      type: int
    - name: available_actions
      type: list[string]
    - name: context
      type: dict
      description: "Task-specific context"

action_space:
  type: discrete_with_params
  actions:
    - name: set_priority
      params: [email_id, priority]
    - name: categorize
      params: [email_id, category]
    - name: draft_reply
      params: [email_id, reply_draft]
    - name: escalate
      params: [email_id, escalation_reason]
    - name: archive
      params: [email_id]
    - name: mark_spam
      params: [email_id]
    - name: snooze
      params: [email_id, snooze_hours]
    - name: flag_for_review
      params: [email_id]
    - name: skip
      params: [email_id]

reward:
  range: [-1.0, 1.0]
  type: dense
  components:
    - correctness: "Was the action correct vs ground truth?"
    - efficiency: "Was action taken without wasted steps?"
    - quality: "Quality of drafted reply or reasoning"
    - penalty: "Penalties for bad behavior (loops, VIP mistakes, excessive skips)"

reproducibility:
  seed_support: true
  deterministic: true
  baseline_model: "gpt-4o-mini"
  baseline_seeds: [42, 43, 44]
